<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d0f0e; --paper:#f5f0e8; --panel:#141714; --card:#1a1e1b; --edge:#252a26; --edge2:#2f3530;
  --amber:#f0a500; --teal:#2dd4a0; --rose:#f05c6e; --sky:#5ca8f0; --text:#e8ede9; --muted:#7a8c7d; --dim:#3a4440;
  --font-serif:'Instrument Serif', Georgia, serif; --font-mono:'JetBrains Mono', monospace; --font-body:'Figtree', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--ink);color:var(--text);font-family:var(--font-body);line-height:1.6;min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.028;pointer-events:none;z-index:9999}
*{scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
nav{display:flex;align-items:center;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--edge);position:relative;z-index:50}
.nav-logo{font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--paper);margin-right:24px}.nav-logo b{font-style:normal;color:var(--amber)}
.nav-tabs{display:flex;height:100%}.nav-tab{display:flex;align-items:center;gap:7px;padding:0 18px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;position:relative;top:1px;text-decoration:none}.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--text);border-bottom-color:var(--amber)}
.tbadge{font-family:var(--font-mono);font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(240,165,0,.12);color:var(--amber);border:1px solid rgba(240,165,0,.2);letter-spacing:.3px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}.api-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:background .3s}.api-dot.live{background:var(--teal);box-shadow:0 0 6px var(--teal)}.api-dot.err{background:var(--rose)}.api-status{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.page{display:flex;height:calc(100vh - 52px)}
.c-rail{width:235px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--edge);display:flex;flex-direction:column;overflow:hidden}
.rsec{padding:14px 14px 6px;font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.rblock{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px}
.rrow{display:flex;justify-content:space-between;align-items:center;font-size:11.5px}.rlbl{color:var(--muted);font-size:11px}.rval{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.depth-track{padding:0 14px 14px}.depth-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-bottom:5px}.depth-bar{height:3px;background:var(--dim);border-radius:2px;position:relative}.depth-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sky),var(--teal));transition:width .5s cubic-bezier(.4,0,.2,1)}.depth-cursor{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid var(--panel);transition:left .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--teal)}
.rdiv{height:1px;background:var(--edge);margin:0 14px 10px}
.hist-list{flex:1;overflow-y:auto;padding:0 14px 14px;display:flex;flex-direction:column;gap:6px}.hist-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;background:var(--card);border:1px solid var(--edge);min-width:0}.hi-q{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--ink)}
.msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;text-align:center}.e-glyph{font-family:var(--font-serif);font-style:italic;font-size:54px;color:var(--amber);opacity:.85;line-height:1}.e-head{font-family:var(--font-serif);font-size:26px;color:var(--paper);font-style:italic;letter-spacing:-.3px}.e-sub{font-size:13px;color:var(--muted);max-width:360px;line-height:1.6}.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}.chip{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--edge2);background:var(--card);color:var(--text);cursor:pointer;transition:all .15s}.chip:hover{border-color:var(--amber);color:var(--amber);background:rgba(240,165,0,.06);transform:translateY(-1px)}
.msg{display:flex;flex-direction:column;gap:5px;animation:slideUp .25s ease}.msg-u{align-items:flex-end}.msg-b{align-items:flex-start}.bubble{padding:12px 16px;border-radius:13px;font-size:13.5px;line-height:1.7;max-width:780px;word-break:break-word;white-space:pre-wrap}.msg-u .bubble{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.22);color:var(--text);border-radius:13px 13px 3px 13px}.msg-b .bubble{background:var(--card);border:1px solid var(--edge);color:var(--text);border-radius:3px 13px 13px 13px}
.src-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;max-width:780px;padding:7px 12px;border-radius:7px;background:var(--panel);border:1px solid var(--edge)}.sb-lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;flex-shrink:0}.src-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;padding:2px 9px;border-radius:4px;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);color:var(--teal)}
.msg-meta{display:flex;align-items:center;gap:8px;padding:0 3px;font-family:var(--font-mono);font-size:10px;color:var(--muted);flex-wrap:wrap}.gbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px}.gbadge.ok{background:rgba(45,212,160,.1);border:1px solid rgba(45,212,160,.25);color:var(--teal)}.gbadge.warn{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);color:var(--amber)}.gbadge.bad{background:rgba(240,92,110,.1);border:1px solid rgba(240,92,110,.25);color:var(--rose)}.gdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.ipill{font-family:var(--font-mono);font-size:9.5px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}.i-define{background:rgba(45,212,160,.12);color:var(--teal)}.i-explain{background:rgba(92,168,240,.12);color:var(--sky)}.i-explore{background:rgba(180,120,255,.12);color:#b478ff}.i-challenge{background:rgba(240,165,0,.12);color:var(--amber)}.i-clarify{background:rgba(240,92,110,.12);color:var(--rose)}.i-summarize{background:rgba(120,200,255,.12);color:#78c8ff}.i-unknown{background:rgba(100,100,100,.1);color:var(--muted)}
.typing-dots{display:flex;align-items:center;gap:4px;padding:14px 16px;background:var(--card);border:1px solid var(--edge);border-radius:3px 13px 13px 13px;width:fit-content}.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:dotB 1.2s infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
.wbar{display:none;align-items:flex-start;gap:8px;max-width:780px;padding:8px 12px;border-radius:6px;background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);font-size:12px;color:var(--amber)}
.input-zone{padding:14px 28px 18px;border-top:1px solid var(--edge);background:var(--ink)}.irow{display:flex;align-items:flex-end;gap:10px;background:var(--card);border:1px solid var(--edge2);border-radius:12px;padding:10px 12px;transition:border-color .15s,box-shadow .15s}.irow:focus-within{border-color:rgba(240,165,0,.4);box-shadow:0 0 0 3px rgba(240,165,0,.06)} textarea{flex:1;min-height:52px;max-height:180px;resize:none;border:0;outline:none;background:transparent;color:var(--text);font:inherit;line-height:1.6;padding:4px 2px}textarea::placeholder{color:var(--muted)} .send-btn{border:0;background:var(--amber);color:#111;min-width:112px;height:42px;border-radius:10px;font-weight:700;cursor:pointer;transition:transform .15s,filter .15s}.send-btn:hover{filter:brightness(1.05)}.send-btn:active{transform:translateY(1px)}.send-btn:disabled{opacity:.5;cursor:not-allowed}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}} @keyframes dotB{0%,80%,100%{transform:scale(.8);opacity:.55}40%{transform:scale(1);opacity:1}}
@media (max-width: 900px){.c-rail{display:none}.msgs{padding:18px}.input-zone{padding:12px 18px 16px}.nav-right{display:none}}
</style>
</head>
<body>
<div class="app">
  <nav>
    <div class="nav-logo">Edu<b>RAG</b></div>
    <div class="nav-tabs">
      <a class="nav-tab active" href="/"><span>Chat</span><span class="tbadge">LIVE</span></a>
      <a class="nav-tab" href="/developer"><span>Evaluation</span></a>
    </div>
    <div class="nav-right">
      <div id="apiDot" class="api-dot"></div>
      <div id="apiStatus" class="api-status">checking dataset</div>
    </div>
  </nav>
  <div class="page">
    <aside class="c-rail">
      <div class="rsec">System</div>
      <div class="rblock">
        <div class="rrow"><span class="rlbl">Dataset chunks</span><span id="datasetCount" class="rval">-</span></div>
        <div class="rrow"><span class="rlbl">Current intent</span><span id="intentVal" class="rval">-</span></div>
        <div class="rrow"><span class="rlbl">Latency</span><span id="latencyVal" class="rval">-</span></div>
      </div>
      <div class="rsec">Depth</div>
      <div class="depth-track">
        <div class="depth-labels"><span>1</span><span>2</span><span>3</span></div>
        <div class="depth-bar"><div id="depthFill" class="depth-fill" style="width:33%"></div><div id="depthCursor" class="depth-cursor" style="left:33%"></div></div>
      </div>
      <div class="rdiv"></div>
      <div class="rsec">Recent prompts</div>
      <div id="historyList" class="hist-list"></div>
    </aside>
    <main class="chat-main">
      <div id="messages" class="msgs">
        <div id="emptyState" class="empty">
          <div class="e-glyph">E</div>
          <div class="e-head">Ask the knowledge base</div>
          <div class="e-sub">Answers come with retrieved sources, a grounding score, and any unsupported spans that still need caution.</div>
          <div class="chips">
            <button class="chip" data-q="What is retrieval-augmented generation?">What is retrieval-augmented generation?</button>
            <button class="chip" data-q="How is grounding score determined?">How is grounding score determined?</button>
            <button class="chip" data-q="Summarize the dataset in simple terms.">Summarize the dataset in simple terms.</button>
          </div>
        </div>
      </div>
      <div class="input-zone">
        <div class="irow">
          <textarea id="message" placeholder="Ask a question about the dataset..."></textarea>
          <button id="sendBtn" class="send-btn">Send</button>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
let sessionId = null;
const $ = (id) => document.getElementById(id);

function escapeHtml(text){return String(text).replace(/[&<>\"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function intentClass(intent){return `i-${intent || 'unknown'}`;}
function groundedBadge(grounded, score){
  if (grounded && score >= 0.85) return { cls:'ok', text:`grounded ${score}` };
  if (grounded) return { cls:'warn', text:`partial ${score}` };
  return { cls:'bad', text:`ungrounded ${score}` };
}
function setDepth(depth){
  const pct = depth === 2 ? 66 : depth === 3 ? 100 : 33;
  $('depthFill').style.width = pct + '%';
  $('depthCursor').style.left = pct + '%';
}
function addHistory(text){
  const item = document.createElement('div');
  item.className = 'hist-item';
  item.innerHTML = `<div class="hi-q">${escapeHtml(text)}</div>`;
  $('historyList').prepend(item);
}
function addUserMessage(text){
  $('emptyState')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-u';
  wrap.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  $('messages').appendChild(wrap);
  $('messages').scrollTop = $('messages').scrollHeight;
}
function addTyping(){
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-b';
  wrap.id = 'typingMsg';
  wrap.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  $('messages').appendChild(wrap);
  $('messages').scrollTop = $('messages').scrollHeight;
}
function removeTyping(){ $('typingMsg')?.remove(); }
function addBotMessage(data){
  const badge = groundedBadge(data.grounded, data.grounding_score);
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-b';
  const sourcePills = (data.sources || []).length
    ? data.sources.map(s => `<span class="src-pill">${escapeHtml(s.source)}${s.page ? ` · p.${escapeHtml(s.page)}` : ''}</span>`).join('')
    : `<span class="src-pill">No sources</span>`;
  const unsupported = (data.unsupported_spans || []).length
    ? `<div class="wbar" style="display:flex">Unsupported spans: ${escapeHtml(data.unsupported_spans.join(' | '))}</div>`
    : '';
  wrap.innerHTML = `
    <div class="bubble">${escapeHtml(data.response)}</div>
    <div class="msg-meta">
      <span class="ipill ${intentClass(data.intent)}">${escapeHtml(data.intent || 'unknown')}</span>
      <span>depth ${escapeHtml(data.depth_label || data.depth)}</span>
      <span>${escapeHtml(data.latency_ms)} ms</span>
      <span class="gbadge ${badge.cls}"><span class="gdot"></span>${escapeHtml(badge.text)}</span>
    </div>
    <div class="src-bar"><span class="sb-lbl">Sources</span>${sourcePills}</div>
    ${unsupported}
  `;
  $('messages').appendChild(wrap);
  $('messages').scrollTop = $('messages').scrollHeight;
}
async function loadDatasetCount(){
  try {
    const res = await fetch('/api/dataset');
    const data = await res.json();
    $('datasetCount').textContent = data.count;
    $('apiStatus').textContent = 'dataset ready';
    $('apiDot').className = 'api-dot live';
  } catch (e) {
    $('apiStatus').textContent = 'dataset unavailable';
    $('apiDot').className = 'api-dot err';
  }
}
async function sendMessage(prefill){
  const message = (prefill ?? $('message').value).trim();
  if (!message) return;
  $('sendBtn').disabled = true;
  addUserMessage(message);
  addHistory(message);
  addTyping();
  $('message').value = '';
  try {
    const res = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message, session_id: sessionId })
    });
    const data = await res.json();
    sessionId = data.session_id;
    $('intentVal').textContent = data.intent || '-';
    $('latencyVal').textContent = `${data.latency_ms} ms`;
    setDepth(data.depth);
    removeTyping();
    addBotMessage(data);
  } catch (e) {
    removeTyping();
    addBotMessage({
      response:'The request failed. Check the server logs and try again.',
      intent:'unknown', depth:1, depth_label:'beginner', latency_ms:0,
      grounded:false, grounding_score:0, unsupported_spans:['request failed'], sources:[]
    });
  } finally {
    $('sendBtn').disabled = false;
    $('message').focus();
  }
}
$('sendBtn').addEventListener('click', () => sendMessage());
$('message').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => sendMessage(btn.dataset.q)));
loadDatasetCount();
</script>
</body>
</html>
